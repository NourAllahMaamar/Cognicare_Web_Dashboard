<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniCare Web - Knowledge Graph Explorer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #f8fafc;
        }
        .header .stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
        .header .stats span { color: #e2e8f0; font-weight: 500; }
        .controls {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 44px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px;
            z-index: 99;
        }
        .controls button {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .controls button:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        .controls input {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            width: 200px;
        }
        #graph {
            position: fixed;
            top: 104px;
            left: 0;
            right: 0;
            bottom: 0;
            cursor: grab;
        }
        #graph:active { cursor: grabbing; }
        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 300px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .tooltip h4 {
            color: #f8fafc;
            margin-bottom: 4px;
        }
        .tooltip p {
            color: #94a3b8;
            margin: 0;
        }
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            padding: 12px;
            font-size: 11px;
            z-index: 100;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #94a3b8;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>CogniCare Web - Knowledge Graph</h1>
        <div class="stats">
            <div>Nodes: <span id="node-count">-</span></div>
            <div>Edges: <span id="edge-count">-</span></div>
        </div>
    </div>
    
    <div class="controls">
        <input type="text" id="search" placeholder="Search nodes...">
        <button onclick="resetZoom()">Reset View</button>
        <button onclick="toggleLabels()">Labels</button>
        <button onclick="toggleSimplify()" id="simplify-btn" style="background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3); color: #22c55e;">Simplify: ON</button>
        <span style="color: #64748b; font-size: 11px; margin-left: auto;">Zoom in for labels • Drag to pan • Scroll to zoom</span>
    </div>
    
    <div id="graph">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading knowledge graph...</p>
        </div>
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>JSX/TSX</div>
        <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>JS/TS</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>CSS/SCSS</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>JSON/Config</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div>Documentation</div>
    </div>

    <script>
        // Color mapping by file type
        const colorMap = {
            'jsx': '#60a5fa',
            'tsx': '#60a5fa',
            'js': '#34d399',
            'ts': '#34d399',
            'css': '#fbbf24',
            'scss': '#fbbf24',
            'json': '#a78bfa',
            'md': '#f472b6',
            'dart': '#00B4AB',
            'yaml': '#cb171e',
            'yml': '#cb171e',
            'gradle': '#02303A',
            'kt': '#7F52FF',
            'kts': '#7F52FF',
            'swift': '#ffac45',
            'default': '#94a3b8'
        };

        let simulation, svg, g, zoom, nodes = [], links = [], allNodes = [], allLinks = [];
        let showLabels = false; // Disabled by default for large graphs
        let LOD_THRESHOLD = 1.5; // Show labels when zoomed beyond this

        // Load graph data from graph-data.json
        async function loadGraphData() {
            try {
                const response = await fetch('graph-data.json');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const graphData = await response.json();

                if (graphData.nodes && graphData.links) {
                    allNodes = graphData.nodes.map(n => ({
                        id: n.id,
                        label: n.label || n.id,
                        file_type: n.file_type || 'code',
                        source_file: n.source_file || n.id
                    }));
                    allLinks = graphData.links.map(l => ({
                        source: l.source,
                        target: l.target
                    }));
                } else if (graphData.nodes && graphData.edges) {
                    allNodes = graphData.nodes;
                    allLinks = graphData.edges;
                } else {
                    throw new Error('Invalid graph data format');
                }

                // Start with simplified view - only show hub nodes (nodes with many connections)
                const hubThreshold = 8;
                const hubIds = new Set();
                allNodes.forEach(n => {
                    const connections = allLinks.filter(l => l.source === n.id || l.target === n.id).length;
                    if (connections >= hubThreshold) hubIds.add(n.id);
                });
                
                // Keep only hub nodes and links between them
                nodes = allNodes.filter(n => hubIds.has(n.id));
                links = allLinks.filter(l => hubIds.has(l.source) && hubIds.has(l.target));
                
                // Convert link references to node objects
                links = links.map(l => ({
                    source: nodes.find(n => n.id === l.source) || l.source,
                    target: nodes.find(n => n.id === l.target) || l.target
                })).filter(l => typeof l.source === 'object' && typeof l.target === 'object');

                document.getElementById('node-count').textContent = nodes.length + ' / ' + allNodes.length;
                document.getElementById('edge-count').textContent = links.length + ' / ' + allLinks.length;

                initGraph();

                console.log(`✅ Loaded graph: ${nodes.length} nodes, ${links.length} edges`);

            } catch (error) {
                console.error('Failed to load graph data:', error);
                document.getElementById('graph').innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #94a3b8;">
                        <h3>📊 Graph data not available</h3>
                        <p>Run the generate script to populate the knowledge graph:</p>
                        <code style="background: #1e293b; padding: 10px 15px; border-radius: 6px; display: inline-block; margin-top: 10px;">
                            bash ../generate-graph.sh
                        </code>
                        <p style="margin-top: 20px; font-size: 12px; color: #64748b;">
                            Error: ${error.message}
                        </p>
                    </div>
                `;
            }
        }

        function initGraph() {
            const container = document.getElementById('graph');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#graph')
                .append('svg')
                .attr('width', width)
                .attr('height', height);

            g = svg.append('g');

            zoom = d3.zoom()
                .scaleExtent([0.05, 5])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                    // Level-of-detail: show/hide labels based on zoom
                    const scale = event.transform.k;
                    if (labels) {
                        labels.style('opacity', (showLabels && scale > LOD_THRESHOLD) ? 0.7 : 0);
                    }
                });

            svg.call(zoom);

            // OPTIMIZED: Aggressive cooling for large graphs
            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(80).strength(0.5))
                .force('charge', d3.forceManyBody().strength(-100).theta(0.9)) // Reduced charge, higher theta
                .force('center', d3.forceCenter(width / 2, height / 2).strength(0.05))
                .force('collision', d3.forceCollide().radius(5).strength(0.3)) // Smaller radius
                .alphaDecay(0.03) // Faster cooling
                .velocityDecay(0.3); // Stabilize faster

            const link = g.append('g')
                .selectAll('line')
                .data(links)
                .enter().append('line')
                .attr('stroke', 'rgba(148, 163, 184, 0.2)')
                .attr('stroke-width', 1);

            const node = g.append('g')
                .selectAll('g')
                .data(nodes)
                .enter().append('g')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));

            node.append('circle')
                .attr('r', 6)
                .attr('fill', d => colorMap[d.file_type] || colorMap.default)
                .attr('stroke', 'rgba(255,255,255,0.1)')
                .attr('stroke-width', 1);

            const labels = g.append('g')
                .selectAll('text')
                .data(nodes)
                .enter().append('text')
                .text(d => d.label)
                .attr('font-size', 9)
                .attr('fill', '#94a3b8')
                .attr('dx', 8)
                .attr('dy', 3)
                .style('pointer-events', 'none')
                .style('opacity', 0); // Hidden by default, shown on zoom

            const tooltip = d3.select('#tooltip');

            node.on('mouseover', (event, d) => {
                tooltip.style('opacity', 1)
                    .html(`<h4>${d.label}</h4><p>${d.file_type} • ${d.source_file}</p>`)
                    .style('left', (event.pageX + 10) + 'px')
                    .style('top', (event.pageY - 10) + 'px');
            }).on('mouseout', () => tooltip.style('opacity', 0));

            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node.attr('transform', d => `translate(${d.x},${d.y})`);
                labels.attr('x', d => d.x).attr('y', d => d.y);
            });

            window.graphLabels = labels;
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function resetZoom() {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        }

        function toggleLabels() {
            showLabels = !showLabels;
            // Get current zoom scale
            const transform = d3.zoomTransform(svg.node());
            const scale = transform.k;
            
            if (labels) {
                labels.style('opacity', showLabels ? 0.7 : 0);
            }
        }

        let isSimplified = true;
        function toggleSimplify() {
            isSimplified = !isSimplified;
            document.getElementById('simplify-btn').textContent = `Simplify: ${isSimplified ? 'ON' : 'OFF'}`;
            
            if (isSimplified) {
                // Show only nodes with many connections (hubs)
                const hubThreshold = 5;
                const hubIds = new Set();
                nodes.forEach(n => {
                    const connections = links.filter(l => l.source.id === n.id || l.target.id === n.id).length;
                    if (connections >= hubThreshold) hubIds.add(n.id);
                });
                
                // Filter to only hub nodes and their direct connections
                const visibleNodes = nodes.filter(n => hubIds.has(n.id));
                const visibleLinks = links.filter(l => hubIds.has(l.source.id) && hubIds.has(l.target.id));
                
                updateGraph(visibleNodes, visibleLinks);
            } else {
                // Show all
                updateGraph(allNodes, allLinks);
            }
        }

        function updateGraph(newNodes, newLinks) {
            // Stop current simulation
            simulation.stop();
            
            // Clear and redraw
            g.selectAll('*').remove();
            
            // Update data
            nodes = newNodes;
            links = newLinks;
            
            // Reinitialize with new data
            initGraph();
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (!term) {
                d3.selectAll('circle').attr('opacity', 1);
                return;
            }
            d3.selectAll('circle').attr('opacity', d => 
                d.label.toLowerCase().includes(term) ? 1 : 0.2
            );
        });

        loadGraphData();
    </script>
</body>
</html>
