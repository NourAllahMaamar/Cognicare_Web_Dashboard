name: Deploy Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: cognicare-web-dashboard-2026it
  NODE_VERSION: '20.x'
  VITE_BACKEND_ORIGIN: https://cognicare-mobile-h4ct.onrender.com
  VITE_RENDER_BACKEND_ORIGIN: https://cognicare-mobile-h4ct.onrender.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Prepare App Service package
        run: node scripts/prepare-azure-app-service-deploy.mjs

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: dist
