services:
  - type: web
    name: cognicare-webapp
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: https://cognicare-mobile-h4ct.onrender.com
    healthCheckPath: /
